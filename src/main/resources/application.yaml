spring:
  threads:
    virtual:
      enabled: true

  main:
    allow-bean-definition-overriding: true
#virtual 스레드 설정값. 아래의 concurreny limit은 들어온 요청에대해서 즉각 생성하는 가상 스레드의 최대갯수를 의미.
        #만약 저값이상으로 요청이들ㅇ어오면 실행중인 가상 스레드가 해재될떄까지 대기.
        #가상 스레드는 비동기하고는 관련이없는 확장성에 관련된 내용일뿐(기존의 io타임으로 스레드가 정지되서 자원이 낭비되는걸 막는)이다.
        #js or rust의 이벤트 루프를 구현한거라고 보면된다.
  #task:
   # execution:
    #  simple:
       # concurrency-limit: 5
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

    #url: jdbc:h2:mem:~/playhive;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    #driver-class-name: org.h2.Driver #com.mysql.cj.jdbc.Driver
    #username: sa #root
    #password: #1234
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update #create-drop
      database-platform: org.hibernate.dialect.PostgreSQLDialect #org.hibernate.dialect.H2Dialect #org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          exception-handling: ignore
